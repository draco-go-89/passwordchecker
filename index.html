<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-transparent luxury-navbar fixed-top">
  <div class="container">
    <a class="navbar-brand nav-brand fw-bold" href="#">🔒 Security Academy</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>

        <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="futuristic-bg"></div>
<div class="sticky-visuals">
  <div class="water-drop drop-1"></div>
  <div class="water-drop drop-2"></div>
  <div class="glass-orb orb-1"></div>
</div>
<main>
  <div class="container my-5 pt-5">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8 col-12">
        <h1 class="fancy-title text-center mb-5">
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="none" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:10px;"><rect width="24" height="24" rx="12" fill="#3b82f6"/><path d="M12 17a2 2 0 0 0 2-2v-1h-4v1a2 2 0 0 0 2 2Zm6-6v-1a6 6 0 1 0-12 0v1a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h1v-2a3 3 0 0 1 6 0v2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2Zm-8-1a4 4 0 1 1 8 0v1h-8v-1Z" fill="#fff"/></svg>
          Security Check 
        </h1>
        <div id="passwordTool" class="card box glassmorph p-4 shadow-lg">
    <div class="icon-orb">
      <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" fill="none" viewBox="0 0 24 24"><rect width="24" height="24" rx="12" fill="#60a5fa"/><path d="M12 17a2 2 0 0 0 2-2v-1h-4v1a2 2 0 0 0 2 2Zm6-6v-1a6 6 0 1 0-12 0v1a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h1v-2a3 3 0 0 1 6 0v2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2Zm-8-1a4 4 0 1 1 8 0v1h-8v-1Z" fill="#fff"/></svg>
    </div>
    <input type="password" id="password" placeholder="Enter your password" autocomplete="off" autofocus oninput="checkPassword()">
    <div class="input-actions d-flex justify-content-center gap-2 mb-3 flex-wrap">
      <button onclick="checkPassword()" class="btn btn-primary neon-btn px-4">Check</button>
      <button onclick="togglePassword()" class="btn btn-outline-light ghost-btn px-3" title="Toggle visibility">
        <span id="eyeIcon">👁️</span>
      </button>
      <button onclick="generatePassword()" class="btn btn-outline-light ghost-btn px-3" title="Generate">
        <span>⚡</span>
      </button>
      <button onclick="copyPassword()" class="btn btn-success ghost-btn px-3" id="copyBtn" style="display:none;" title="Copy">
        📋
      </button>
    </div>
    <div class="strength-bar" id="strengthBar"><div></div></div>
    <p id="result"></p>
  </div>
  
  <section class="educational-tips py-5">
    <div class="container">
      <h2 class="tip-title text-center mb-5">💡 Pro Password Tips</h2>
      <div class="row g-4">
        <div class="col-lg-3 col-md-6">
          <div class="tip-item card glassmorph h-100 p-4 text-center">
            <span class="tip-icon fs-1 d-block mb-3">📏</span>
            <p class="mb-0">12+ characters</p>
          </div>
        </div>
        <div class="col-lg-3 col-md-6">
          <div class="tip-item card glassmorph h-100 p-4 text-center">
            <span class="tip-icon fs-1 d-block mb-3">🔤</span>
            <p class="mb-0">Upper & Lowercase</p>
          </div>
        </div>
        <div class="col-lg-3 col-md-6">
          <div class="tip-item card glassmorph h-100 p-4 text-center">
            <span class="tip-icon fs-1 d-block mb-3">🔢</span>
            <p class="mb-0">Numbers & Symbols</p>
          </div>
        </div>
        <div class="col-lg-3 col-md-6">
          <div class="tip-item card glassmorph h-100 p-4 text-center">
            <span class="tip-icon fs-1 d-block mb-3">🚫</span>
            <p class="mb-0">Avoid common words</p>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
